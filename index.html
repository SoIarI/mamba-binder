<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Binder</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600&display=swap');

    :root {
      --font-sans: 'DM Sans', system-ui, sans-serif;
      --space-1:  4px;  --space-2:  8px;  --space-3: 12px;
      --space-4: 16px;  --space-5: 20px;  --space-6: 24px;
      --space-8: 32px;  --space-10: 40px; --space-12: 48px;
      --text-xs: 12px;  --text-sm: 14px;  --text-base: 16px;
      --text-lg: 20px;  --text-xl: 24px;  --text-2xl: 32px;
      --color-bg:             #0F0F0F;
      --color-bg-subtle:      #1A1A1A;
      --color-bg-muted:       #242424;
      --color-border:         #2E2E2E;
      --color-text-primary:   #F0F0F0;
      --color-text-secondary: #A0A0A0;
      --color-text-tertiary:  #666666;
      --color-accent:         #8B0000;
      --color-accent-hover:   #6E0000;
      --color-accent-subtle:  #2A0000;
      --color-success:        #16A34A;
      --color-error:          #DC2626;
      --radius-sm:   6px;
      --radius-md:   12px;
      --radius-lg:   22px;
      --radius-full: 9999px;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.4);
      --shadow-md: 0 4px 16px rgba(0,0,0,0.5);
      --transition-fast: 150ms ease;
      --transition-base: 200ms ease;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-sans);
      background-color: var(--color-bg);
      color: var(--color-text-primary);
      min-height: 100vh;
      font-size: var(--text-base);
    }

    .hidden { display: none !important; }
    .sr-only {
      position: absolute;
      width: 1px; height: 1px;
      padding: 0; margin: -1px;
      overflow: hidden; clip: rect(0,0,0,0);
      white-space: nowrap; border-width: 0;
    }

    /* ---- Login ---- */
    #login-screen {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: var(--space-4);
    }

    .login-card {
      background-color: var(--color-bg-subtle);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-10);
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-md);
    }

    .login-logo {
      font-size: var(--text-2xl);
      font-weight: 600;
      margin-bottom: var(--space-8);
      display: flex;
      align-items: center;
      gap: var(--space-2);
    }

    .login-logo .accent-dot {
      width: 10px;
      height: 10px;
      background-color: var(--color-accent);
      border-radius: var(--radius-full);
      display: inline-block;
      flex-shrink: 0;
    }

    .login-subtitle {
      font-size: var(--text-lg);
      font-weight: 600;
      margin-bottom: var(--space-6);
      color: var(--color-text-primary);
    }

    .form-group { margin-bottom: var(--space-4); }

    .form-label {
      display: block;
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      margin-bottom: var(--space-2);
    }

    .form-input {
      width: 100%;
      padding: var(--space-3) var(--space-4);
      background-color: var(--color-bg-muted);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-sm);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      font-size: var(--text-base);
      transition: border-color var(--transition-fast);
      outline: none;
    }

    .form-input:focus { border-color: var(--color-accent); }
    .form-input::placeholder { color: var(--color-text-tertiary); }

    .login-toggle {
      margin-top: var(--space-4);
      text-align: center;
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
    }

    .link {
      color: var(--color-accent);
      cursor: pointer;
      text-decoration: underline;
      background: none;
      border: none;
      font-family: var(--font-sans);
      font-size: inherit;
      padding: 0;
    }

    /* ---- Buttons ---- */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--space-2);
      padding: var(--space-3) var(--space-5);
      border: none;
      border-radius: var(--radius-sm);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      font-weight: 500;
      cursor: pointer;
      transition: background-color var(--transition-fast);
      white-space: nowrap;
    }

    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-accent {
      background-color: var(--color-accent);
      color: var(--color-text-primary);
    }

    .btn-accent:hover:not(:disabled) { background-color: var(--color-accent-hover); }

    .btn-ghost {
      background-color: transparent;
      color: var(--color-text-secondary);
      border: 1px solid var(--color-border);
    }

    .btn-ghost:hover { background-color: var(--color-bg-muted); color: var(--color-text-primary); }

    .btn-full { width: 100%; }

    /* ---- App ---- */
    #app {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ---- Header ---- */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background-color: var(--color-bg);
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-4);
    }

    .header-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: var(--space-3);
    }

    .header-brand {
      font-size: var(--text-xl);
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
      order: 1;
    }

    .brand-dot {
      width: 8px;
      height: 8px;
      background-color: var(--color-accent);
      border-radius: var(--radius-full);
      flex-shrink: 0;
    }

    .header-search {
      order: 3;
      width: 100%;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: var(--space-2);
      flex-shrink: 0;
      margin-left: auto;
      order: 2;
    }

    .search-input {
      width: 100%;
      padding: var(--space-2) var(--space-4);
      background-color: var(--color-bg-subtle);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-full);
      color: var(--color-text-primary);
      font-family: var(--font-sans);
      font-size: var(--text-sm);
      outline: none;
      transition: border-color var(--transition-fast);
    }

    .search-input:focus { border-color: var(--color-accent); }
    .search-input::placeholder { color: var(--color-text-tertiary); }

    @media (min-width: 640px) {
      .header-search { order: 2; width: auto; flex: 1; }
      .header-actions { order: 3; }
    }

    @media (max-width: 639px) {
      .btn-label { display: none; }
      .header-actions .btn { padding: var(--space-2); }
    }

    /* ---- Tag Bar ---- */
    .tag-bar {
      border-bottom: 1px solid var(--color-border);
      padding: var(--space-3) var(--space-4);
      overflow-x: auto;
      scrollbar-width: none;
    }

    .tag-bar::-webkit-scrollbar { display: none; }

    .tag-bar-inner {
      max-width: 1200px;
      margin: 0 auto;
      display: flex;
      flex-wrap: nowrap;
      gap: var(--space-2);
      min-width: max-content;
    }

    @media (min-width: 640px) {
      .tag-bar-inner { flex-wrap: wrap; min-width: 0; }
    }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-full);
      font-size: var(--text-xs);
      font-weight: 500;
      cursor: pointer;
      transition: background-color var(--transition-fast), color var(--transition-fast), border-color var(--transition-fast);
      white-space: nowrap;
      border: 1px solid var(--color-border);
      background-color: transparent;
      color: var(--color-text-secondary);
      font-family: var(--font-sans);
    }

    .tag-pill:hover { background-color: var(--color-bg-muted); color: var(--color-text-primary); }

    .tag-pill.active {
      background-color: var(--color-accent-subtle);
      color: var(--color-accent);
      border-color: var(--color-accent);
    }

    /* ---- Main ---- */
    .main {
      flex: 1;
      padding: var(--space-6) var(--space-4);
      padding-bottom: var(--space-12);
    }

    .main-inner { max-width: 1200px; margin: 0 auto; }

    .section-heading {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--color-text-tertiary);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: var(--space-4);
    }

    #pinned-section { margin-bottom: var(--space-8); }

    .grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--space-4);
    }

    @media (min-width: 640px) {
      .grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (min-width: 1024px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    /* ---- Cards ---- */
    .card {
      background-color: var(--color-bg-subtle);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-6);
      display: flex;
      flex-direction: column;
      gap: var(--space-3);
      position: relative;
      transition: border-color var(--transition-base), box-shadow var(--transition-base);
    }

    .card:hover { border-color: var(--color-text-tertiary); box-shadow: var(--shadow-sm); }

    .card-pin-badge {
      position: absolute;
      top: var(--space-3);
      right: var(--space-3);
      background-color: var(--color-accent);
      color: var(--color-text-primary);
      font-size: var(--text-xs);
      padding: 2px var(--space-2);
      border-radius: var(--radius-full);
      font-weight: 500;
    }

    .card-name {
      font-size: var(--text-lg);
      font-weight: 600;
      padding-right: var(--space-8);
      line-height: 1.3;
    }

    .card-description {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      flex: 1;
      line-height: 1.5;
    }

    .card-tags {
      display: flex;
      flex-wrap: wrap;
      gap: var(--space-1);
    }

    .card-tag {
      background-color: var(--color-accent-subtle);
      color: var(--color-accent);
      font-size: var(--text-xs);
      padding: 2px var(--space-2);
      border-radius: var(--radius-full);
      font-weight: 500;
    }

    .card-actions {
      display: flex;
      align-items: center;
      gap: var(--space-1);
      padding-top: var(--space-2);
      border-top: 1px solid var(--color-border);
      flex-wrap: wrap;
    }

    .card-btn {
      display: inline-flex;
      align-items: center;
      gap: var(--space-1);
      padding: var(--space-1) var(--space-3);
      border-radius: var(--radius-sm);
      font-size: var(--text-xs);
      font-weight: 500;
      cursor: pointer;
      transition: background-color var(--transition-fast), color var(--transition-fast);
      border: none;
      font-family: var(--font-sans);
      color: var(--color-text-secondary);
      background-color: transparent;
    }

    .card-btn:hover { background-color: var(--color-bg-muted); color: var(--color-text-primary); }
    .card-btn.open-btn { color: var(--color-accent); }
    .card-btn.open-btn:hover { background-color: var(--color-accent-subtle); color: var(--color-accent); }
    .card-btn.delete-btn:hover { background-color: var(--color-error); color: var(--color-text-primary); }
    .card-btn.pin-btn.is-pinned { color: var(--color-accent); }

    .card-spacer { flex: 1; }

    /* ---- Empty State ---- */
    #empty-state {
      text-align: center;
      padding: var(--space-12) var(--space-4);
      color: var(--color-text-tertiary);
    }

    .empty-icon { font-size: var(--text-2xl); margin-bottom: var(--space-4); }

    .empty-title {
      font-size: var(--text-lg);
      font-weight: 500;
      margin-bottom: var(--space-2);
      color: var(--color-text-secondary);
    }

    /* ---- FAB ---- */
    #fab {
      position: fixed;
      bottom: var(--space-8);
      right: var(--space-8);
      width: 56px;
      height: 56px;
      border-radius: var(--radius-full);
      background-color: var(--color-accent);
      color: var(--color-text-primary);
      border: none;
      font-size: var(--text-xl);
      cursor: pointer;
      box-shadow: var(--shadow-md);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: background-color var(--transition-fast), transform var(--transition-fast);
      font-family: var(--font-sans);
      line-height: 1;
    }

    #fab:hover { background-color: var(--color-accent-hover); transform: scale(1.06); }

    /* ---- Modal ---- */
    #modal-overlay {
      position: fixed;
      inset: 0;
      background-color: rgba(0, 0, 0, 0.7);
      z-index: 300;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: var(--space-4);
    }

    #modal {
      background-color: var(--color-bg-subtle);
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      padding: var(--space-8);
      width: 100%;
      max-width: 480px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow-md);
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--space-6);
    }

    .modal-title { font-size: var(--text-lg); font-weight: 600; }

    .modal-close {
      background: none;
      border: none;
      color: var(--color-text-secondary);
      font-size: var(--text-xl);
      cursor: pointer;
      padding: var(--space-1) var(--space-2);
      line-height: 1;
      border-radius: var(--radius-sm);
      transition: color var(--transition-fast), background-color var(--transition-fast);
      font-family: var(--font-sans);
    }

    .modal-close:hover { color: var(--color-text-primary); background-color: var(--color-bg-muted); }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: var(--space-3);
    }

    .checkbox-row input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--color-accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .checkbox-label {
      font-size: var(--text-sm);
      color: var(--color-text-secondary);
      cursor: pointer;
      margin-bottom: 0;
    }

    /* ---- Toast ---- */
    #toast {
      position: fixed;
      bottom: var(--space-8);
      left: 50%;
      transform: translateX(-50%);
      z-index: 400;
      padding: var(--space-3) var(--space-6);
      border-radius: var(--radius-md);
      font-size: var(--text-sm);
      font-weight: 500;
      box-shadow: var(--shadow-md);
      white-space: nowrap;
      pointer-events: none;
    }

    #toast.success { background-color: var(--color-success); color: var(--color-text-primary); }
    #toast.error   { background-color: var(--color-error);   color: var(--color-text-primary); }
  </style>
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen">
    <div class="login-card">
      <div class="login-logo">
        Binder <span class="accent-dot"></span>
      </div>
      <div id="login-subtitle" class="login-subtitle">Sign in to your account</div>
      <div class="form-group">
        <label class="form-label" for="auth-email">Email</label>
        <input class="form-input" type="email" id="auth-email" placeholder="you@example.com" autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="auth-password">Password</label>
        <input class="form-input" type="password" id="auth-password" placeholder="••••••••" autocomplete="current-password" />
      </div>
      <button class="btn btn-accent btn-full" id="auth-btn" onclick="handleAuthSubmit()">Sign In</button>
      <div class="login-toggle">
        <span id="auth-toggle-msg">Don't have an account?</span>
        <button class="link" id="auth-toggle-link" onclick="toggleAuthMode()">Sign Up</button>
      </div>
    </div>
  </div>

  <!-- App -->
  <div id="app" class="hidden">

    <!-- Header -->
    <header class="header">
      <div class="header-inner">
        <div class="header-brand">
          <span class="brand-dot"></span>
          Binder
        </div>
        <div class="header-search">
          <input class="search-input" type="text" id="search-input" placeholder="Search projects…" oninput="handleSearch(this.value)" />
        </div>
        <div class="header-actions">
          <input class="sr-only" type="file" id="import-file-input" accept=".json" onchange="handleImport(event)" />
          <button class="btn btn-ghost" onclick="document.getElementById('import-file-input').click()" title="Import">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            <span class="btn-label">Import</span>
          </button>
          <button class="btn btn-ghost" onclick="handleExport()" title="Export">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            <span class="btn-label">Export</span>
          </button>
          <button class="btn btn-ghost" onclick="handleSignOut()" title="Logout">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            <span class="btn-label">Logout</span>
          </button>
        </div>
      </div>
    </header>

    <!-- Tag Filter Bar -->
    <div class="tag-bar">
      <div class="tag-bar-inner" id="tag-pills"></div>
    </div>

    <!-- Main Content -->
    <main class="main">
      <div class="main-inner">

        <section id="pinned-section" class="hidden">
          <div class="section-heading">Pinned</div>
          <div class="grid" id="pinned-grid"></div>
        </section>

        <section id="all-section">
          <div class="grid" id="all-grid"></div>
        </section>

        <div id="empty-state" class="hidden">
          <div class="empty-icon">📂</div>
          <div class="empty-title">No projects found</div>
          <div>Try a different search or add a new project</div>
        </div>

      </div>
    </main>

    <!-- FAB -->
    <button id="fab" onclick="openModal(null)" title="Add project" aria-label="Add project">+</button>

  </div>

  <!-- Modal -->
  <div id="modal-overlay" class="hidden" onclick="handleOverlayClick(event)">
    <div id="modal" role="dialog" aria-modal="true" aria-labelledby="modal-title">
      <div class="modal-header">
        <div class="modal-title" id="modal-title">Add Project</div>
        <button class="modal-close" onclick="closeModal()" aria-label="Close">&#x2715;</button>
      </div>
      <div class="form-group">
        <label class="form-label" for="m-name">Name *</label>
        <input class="form-input" type="text" id="m-name" placeholder="Project name" />
      </div>
      <div class="form-group">
        <label class="form-label" for="m-desc">Description</label>
        <input class="form-input" type="text" id="m-desc" placeholder="Short description" />
      </div>
      <div class="form-group">
        <label class="form-label" for="m-url">URL *</label>
        <input class="form-input" type="text" id="m-url" placeholder="https://…" />
      </div>
      <div class="form-group">
        <label class="form-label" for="m-tags">Tags (comma-separated)</label>
        <input class="form-input" type="text" id="m-tags" placeholder="tag1, tag2" />
      </div>
      <div class="form-group">
        <div class="checkbox-row">
          <input type="checkbox" id="m-pinned" />
          <label class="checkbox-label" for="m-pinned">Pin this project</label>
        </div>
      </div>
      <button class="btn btn-accent btn-full" onclick="saveModal()">Save Project</button>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="hidden" role="status" aria-live="polite"></div>

  <!-- Supabase JS v2 CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    // 1. Constants
    const SUPABASE_URL = 'https://lwzhsshqxpqzbjlryazg.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3emhzc2hxeHBxemJqbHJ5YXpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODI3Mjc4ODMsImV4cCI6MjA5ODMwMzg4M30.bhzxntpsWXVWIz9hO5TD_hihyYwMHkD5tQwhCILvb9I';

    // 2. Supabase client
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 3. State
    const state = {
      session:     null,
      projects:    [],
      searchQuery: '',
      activeTags:  []
    };

    let authMode        = 'signin';
    let editingId       = null;
    let toastTimer      = null;
    let realtimeChannel = null;

    // ---- 4. Auth ----

    async function checkSession() {
      const { data: { session } } = await db.auth.getSession();
      if (session) {
        state.session = session;
        await bootApp();
      } else {
        showLogin();
      }
    }

    async function bootApp() {
      showApp();
      await fetchProjects();
      initRealtime();
      renderAll();
    }

    async function handleAuthSubmit() {
      const email    = document.getElementById('auth-email').value.trim();
      const password = document.getElementById('auth-password').value;
      if (!email || !password) { showToast('Enter email and password', 'error'); return; }

      const btn = document.getElementById('auth-btn');
      btn.disabled    = true;
      btn.textContent = authMode === 'signin' ? 'Signing in…' : 'Creating account…';

      try {
        if (authMode === 'signin') {
          const { data, error } = await db.auth.signInWithPassword({ email, password });
          if (error) throw error;
          state.session = data.session;
          await bootApp();
        } else {
          const { error } = await db.auth.signUp({ email, password });
          if (error) throw error;
          showToast('Account created! Check your email to confirm.', 'success');
        }
      } catch (err) {
        showToast(err.message || 'Authentication failed', 'error');
      } finally {
        btn.disabled    = false;
        btn.textContent = authMode === 'signin' ? 'Sign In' : 'Sign Up';
      }
    }

    async function handleSignOut() {
      if (realtimeChannel) { db.removeChannel(realtimeChannel); realtimeChannel = null; }
      await db.auth.signOut();
      state.session  = null;
      state.projects = [];
      showLogin();
    }

    function toggleAuthMode() {
      authMode = authMode === 'signin' ? 'signup' : 'signin';
      const isSignup = authMode === 'signup';
      document.getElementById('login-subtitle').textContent  = isSignup ? 'Create your account' : 'Sign in to your account';
      document.getElementById('auth-btn').textContent        = isSignup ? 'Sign Up' : 'Sign In';
      document.getElementById('auth-toggle-msg').textContent = isSignup ? 'Already have an account?' : "Don't have an account?";
      document.getElementById('auth-toggle-link').textContent= isSignup ? 'Sign In' : 'Sign Up';
    }

    function showLogin() {
      document.getElementById('login-screen').classList.remove('hidden');
      document.getElementById('app').classList.add('hidden');
    }

    function showApp() {
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').classList.remove('hidden');
    }

    // ---- 5. Data ----

    async function fetchProjects() {
      const { data, error } = await db.from('projects').select('*').order('created_at', { ascending: false });
      if (error) { showToast('Failed to load projects', 'error'); return; }
      state.projects = data || [];
    }

    async function addProject(fields) {
      const { error } = await db.from('projects').insert({ ...fields, user_id: state.session.user.id });
      if (error) throw error;
    }

    async function updateProject(id, fields) {
      const { error } = await db.from('projects').update(fields).eq('id', id);
      if (error) throw error;
    }

    async function deleteProject(id) {
      const { error } = await db.from('projects').delete().eq('id', id);
      if (error) throw error;
    }

    async function togglePin(id, currentPinned) {
      const { error } = await db.from('projects').update({ pinned: !currentPinned }).eq('id', id);
      if (error) showToast('Failed to update pin', 'error');
    }

    // ---- 6. Realtime ----

    function initRealtime() {
      if (realtimeChannel) return;
      realtimeChannel = db
        .channel('projects-rt')
        .on('postgres_changes', {
          event: '*',
          schema: 'public',
          table: 'projects',
          filter: `user_id=eq.${state.session.user.id}`
        }, (payload) => {
          if (payload.eventType === 'INSERT') {
            const exists = state.projects.some(p => p.id === payload.new.id);
            if (!exists) state.projects.unshift(payload.new);
          } else if (payload.eventType === 'UPDATE') {
            const idx = state.projects.findIndex(p => p.id === payload.new.id);
            if (idx !== -1) state.projects[idx] = payload.new;
            else state.projects.unshift(payload.new);
          } else if (payload.eventType === 'DELETE') {
            state.projects = state.projects.filter(p => p.id !== payload.old.id);
          }
          renderAll();
        })
        .subscribe();
    }

    // ---- 8. Render ----

    function getFiltered() {
      const q = state.searchQuery.toLowerCase();
      return state.projects.filter(p => {
        const matchSearch = !q
          || p.name.toLowerCase().includes(q)
          || (p.description || '').toLowerCase().includes(q)
          || (p.tags || []).some(t => t.toLowerCase().includes(q));
        const matchTags = state.activeTags.length === 0
          || (p.tags || []).some(t => state.activeTags.includes(t));
        return matchSearch && matchTags;
      });
    }

    function renderAll() {
      renderTags();
      const filtered = getFiltered();
      const pinned   = filtered.filter(p => p.pinned);
      const rest     = filtered.filter(p => !p.pinned);

      const pinnedSection = document.getElementById('pinned-section');
      const pinnedGrid    = document.getElementById('pinned-grid');
      const allGrid       = document.getElementById('all-grid');
      const emptyState    = document.getElementById('empty-state');

      pinnedGrid.innerHTML = '';
      allGrid.innerHTML    = '';

      if (pinned.length > 0) {
        pinnedSection.classList.remove('hidden');
        pinned.forEach(p => pinnedGrid.appendChild(renderCard(p)));
      } else {
        pinnedSection.classList.add('hidden');
      }

      rest.forEach(p => allGrid.appendChild(renderCard(p)));

      emptyState.classList.toggle('hidden', filtered.length > 0);
    }

    function renderTags() {
      const allTags = [...new Set(state.projects.flatMap(p => p.tags || []))].sort();
      const container = document.getElementById('tag-pills');
      container.innerHTML = '';

      const allPill = makeTagPill('All', state.activeTags.length === 0, () => {
        state.activeTags = [];
        renderAll();
      });
      container.appendChild(allPill);

      allTags.forEach(tag => {
        const pill = makeTagPill(tag, state.activeTags.includes(tag), () => {
          state.activeTags = state.activeTags.includes(tag)
            ? state.activeTags.filter(t => t !== tag)
            : [...state.activeTags, tag];
          renderAll();
        });
        container.appendChild(pill);
      });
    }

    function makeTagPill(label, active, onClick) {
      const btn = document.createElement('button');
      btn.className   = 'tag-pill' + (active ? ' active' : '');
      btn.textContent = label;
      btn.onclick     = onClick;
      return btn;
    }

    function renderCard(p) {
      const card = document.createElement('div');
      card.className    = 'card';
      card.dataset.id   = p.id;

      if (p.pinned) {
        const badge = document.createElement('span');
        badge.className   = 'card-pin-badge';
        badge.textContent = 'Pinned';
        card.appendChild(badge);
      }

      const name = document.createElement('div');
      name.className   = 'card-name';
      name.textContent = p.name;
      card.appendChild(name);

      if (p.description) {
        const desc = document.createElement('div');
        desc.className   = 'card-description';
        desc.textContent = p.description;
        card.appendChild(desc);
      }

      if ((p.tags || []).length > 0) {
        const tagRow = document.createElement('div');
        tagRow.className = 'card-tags';
        p.tags.forEach(t => {
          const chip = document.createElement('span');
          chip.className   = 'card-tag';
          chip.textContent = t;
          tagRow.appendChild(chip);
        });
        card.appendChild(tagRow);
      }

      const actions = document.createElement('div');
      actions.className = 'card-actions';

      const openBtn = makeCardBtn('Open', 'open-btn', () => {
        const safeUrl = makeSafeUrl(p.url);
        if (safeUrl) window.open(safeUrl, '_blank', 'noopener,noreferrer');
      });

      const editBtn = makeCardBtn('Edit', '', () => openModal(p.id));

      const spacer = document.createElement('span');
      spacer.className = 'card-spacer';

      const pinBtn = makeCardBtn(p.pinned ? 'Unpin' : 'Pin', 'pin-btn' + (p.pinned ? ' is-pinned' : ''), () => togglePin(p.id, p.pinned));

      const delBtn = makeCardBtn('Delete', 'delete-btn', () => handleDelete(p.id));

      actions.appendChild(openBtn);
      actions.appendChild(editBtn);
      actions.appendChild(spacer);
      actions.appendChild(pinBtn);
      actions.appendChild(delBtn);
      card.appendChild(actions);

      return card;
    }

    function makeCardBtn(label, extraClass, onClick) {
      const btn = document.createElement('button');
      btn.className   = ('card-btn ' + extraClass).trim();
      btn.textContent = label;
      btn.onclick     = onClick;
      return btn;
    }

    function makeSafeUrl(url) {
      try {
        const parsed = new URL(url, window.location.href);
        if (parsed.protocol === 'javascript:') return null;
        return url;
      } catch { return url; }
    }

    // ---- 9. Modal ----

    function openModal(idOrNull) {
      editingId = idOrNull;
      document.getElementById('modal-title').textContent = idOrNull ? 'Edit Project' : 'Add Project';

      if (idOrNull) {
        const p = state.projects.find(p => p.id === idOrNull);
        if (!p) return;
        document.getElementById('m-name').value   = p.name        || '';
        document.getElementById('m-desc').value   = p.description || '';
        document.getElementById('m-url').value    = p.url         || '';
        document.getElementById('m-tags').value   = (p.tags || []).join(', ');
        document.getElementById('m-pinned').checked = !!p.pinned;
      } else {
        document.getElementById('m-name').value    = '';
        document.getElementById('m-desc').value    = '';
        document.getElementById('m-url').value     = '';
        document.getElementById('m-tags').value    = '';
        document.getElementById('m-pinned').checked = false;
      }

      document.getElementById('modal-overlay').classList.remove('hidden');
      document.getElementById('m-name').focus();
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
      editingId = null;
    }

    function handleOverlayClick(e) {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    }

    async function saveModal() {
      const name   = document.getElementById('m-name').value.trim();
      const desc   = document.getElementById('m-desc').value.trim();
      const url    = document.getElementById('m-url').value.trim();
      const tagRaw = document.getElementById('m-tags').value.trim();
      const pinned = document.getElementById('m-pinned').checked;

      if (!name) { showToast('Name is required', 'error'); return; }
      if (!url)  { showToast('URL is required',  'error'); return; }

      const tags = tagRaw ? tagRaw.split(',').map(t => t.trim()).filter(Boolean) : [];

      try {
        if (editingId) {
          await updateProject(editingId, { name, description: desc, url, tags, pinned });
          showToast('Project updated', 'success');
        } else {
          await addProject({ name, description: desc, url, tags, pinned });
          showToast('Project added', 'success');
        }
        closeModal();
      } catch (err) {
        showToast(err.message || 'Save failed', 'error');
      }
    }

    async function handleDelete(id) {
      if (!confirm('Delete this project? This cannot be undone.')) return;
      try {
        await deleteProject(id);
        showToast('Project deleted', 'success');
      } catch (err) {
        showToast(err.message || 'Delete failed', 'error');
      }
    }

    function handleSearch(value) {
      state.searchQuery = value;
      renderAll();
    }

    // ---- 10. Export / Import ----

    async function handleExport() {
      try {
        const { data, error } = await db
          .from('projects')
          .select('*')
          .order('created_at', { ascending: false });
        if (error) throw error;

        const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = document.createElement('a');
        a.href     = url;
        a.download = 'binder-export.json';
        a.click();
        URL.revokeObjectURL(url);
        showToast('Exported successfully', 'success');
      } catch (err) {
        showToast(err.message || 'Export failed', 'error');
      }
    }

    async function handleImport(event) {
      const file = event.target.files[0];
      if (!file) return;
      event.target.value = '';

      let imported;
      try {
        const text = await file.text();
        imported = JSON.parse(text);
        if (!Array.isArray(imported)) throw new Error('File must contain a JSON array');
      } catch (err) {
        showToast(err.message || 'Invalid JSON file', 'error');
        return;
      }

      let added = 0, updated = 0;

      for (const item of imported) {
        const { name, description, url, tags, pinned } = item;
        if (!name || !url) continue;
        const existing = state.projects.find(p => p.name === name && p.url === url);
        try {
          if (existing) {
            await updateProject(existing.id, {
              name, description: description || '',
              url, tags: tags || [], pinned: !!pinned
            });
            updated++;
          } else {
            await addProject({
              name, description: description || '',
              url, tags: tags || [], pinned: !!pinned
            });
            added++;
          }
        } catch { /* skip bad rows */ }
      }

      showToast(`Import complete: ${added} added, ${updated} updated`, 'success');
    }

    // ---- 11. Toast ----

    function showToast(message, type) {
      const toast    = document.getElementById('toast');
      toast.textContent = message;
      toast.className   = type || 'success';
      if (toastTimer) clearTimeout(toastTimer);
      toastTimer = setTimeout(() => toast.classList.add('hidden'), 3000);
    }

    // ---- 12. Event listeners ----

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    document.getElementById('auth-email').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAuthSubmit();
    });

    document.getElementById('auth-password').addEventListener('keydown', e => {
      if (e.key === 'Enter') handleAuthSubmit();
    });

    // ---- 13. Init ----

    document.addEventListener('DOMContentLoaded', checkSession);
  </script>
</body>
